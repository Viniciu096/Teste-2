name: Discord.yml
on:

jobs:
  - push

discord:
  runs-on: ubuntu-latest
  steps:
    - user: actions/chekout@v4
    - name: Run Discord Webhook
      user: Sniddl/discord-comits@v1.6
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK}}
        template: "avatar-with-link"
        include-extras: true