name: CI Testes

on:
  push:
    branches: [ "Teste" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: python -m pip install --upgrade pip

    - name: Rodar programa
      run: python Tete.py